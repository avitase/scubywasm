name: Agents CI

on:
  push:
  pull_request:

jobs:
  check-format:
    name: Agents format checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run format check
        working-directory: agents
        run: make check-format

  lint:
    name: Agents linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run linter
        working-directory: agents
        run: make lint

  build:
    name: Build & upload simple_agent.wasm
    runs-on: ubuntu-latest
    needs: [check-format, lint]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build project
        working-directory: agents
        run: make

      - name: Upload simple_agent.wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-agent-wasm
          path: agents/build/simple_agent.wasm

  docs:
    name: Build agent documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Build documentation
        run: |
          set -e
          doxygen Doxyfile
          test -f doc/build/html/index.html

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc/build/html

  deploy-docs:
    name: Deploy agent documentation to GitHub Pages
    runs-on: ubuntu-latest
    needs: docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

