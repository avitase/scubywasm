name: Agents CI

on:
  push:
  pull_request:

jobs:
  check-format:
    name: Agents format checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run format check
        working-directory: agents
        run: make check-format

  lint:
    name: Agents linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run linter
        working-directory: agents
        run: make lint

  build:
    name: Build & upload simple_agent.wasm
    runs-on: ubuntu-latest
    needs: [check-format, lint]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build project
        working-directory: agents
        run: make

      - name: Upload simple_agent.wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-agent-wasm
          path: agents/build/simple_agent.wasm

